<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PEAK — مدربك الذكي</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ---- سطح اللون: غرافيت عميق بدل الأزرق الداكن التقليدي ---- */
      --bg-0: #0A0C10;
      --bg-1: #12151C;
      --surface: #171B24;
      --surface-raised: #1D222D;
      --hairline: #262B38;
      --hairline-bright: #363D4E;

      --text-primary: #F4F6FA;
      --text-secondary: #9CA5B8;
      --text-muted: #616B80;

      /* ---- ليمون كهربائي: هوية الأداء بدل البرتقالي المعتاد ---- */
      --lime: #C9FF3D;
      --lime-dim: #9CD62A;
      --lime-soft: rgba(201,255,61,0.12);
      --lime-glow: rgba(201,255,61,0.35);

      --cobalt: #5B8CFF;
      --cobalt-soft: rgba(91,140,255,0.14);

      --success: #35E0A1;
      --success-soft: rgba(53,224,161,0.14);
      --warning: #FFC93D;
      --warning-soft: rgba(255,201,61,0.14);
      --danger: #FF5C7A;
      --danger-soft: rgba(255,92,122,0.14);

      --font-display: 'Barlow Condensed', 'Cairo', sans-serif;
      --font-body: 'Cairo', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --shadow-elev: 0 24px 48px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; overflow-x: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--bg-0);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,255,61,0.06), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(91,140,255,0.05), transparent);
      background-attachment: fixed;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      direction: rtl;
      min-height: 100vh;
    }
    #root { width: 100%; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 860px; padding: 16px 16px 32px; display: flex; flex-direction: column; gap: 14px; }

    ::selection { background: var(--lime); color: #0A0C10; }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-thumb { background: var(--hairline-bright); border-radius: 10px; }
    :focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

    /* ============ بنية البطاقات ============ */
    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 22px;
      width: 100%;
    }
    .card-flush { padding: 0; overflow: hidden; }
    .panel {
      background: var(--surface-raised);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    h1, h2, h3 { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.2px; }
    h1 { font-size: 32px; }
    h2 { font-size: 24px; }
    h3 { font-size: 19px; }
    .eyebrow {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--lime); font-weight: 500;
    }
    .mono { font-family: var(--font-mono); }

    /* ============ أزرار ============ */
    .btn {
      background: var(--lime);
      color: #0A0C10;
      border: none;
      padding: 15px 24px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      font-family: var(--font-body);
      box-shadow: 0 0 0 0 var(--lime-glow);
    }
    .btn:hover { background: #D7FF6B; box-shadow: 0 8px 28px var(--lime-glow); transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: var(--hairline-bright); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }
    .btn-outline { background: transparent; border: 1.5px solid var(--hairline-bright); color: var(--text-primary); }
    .btn-outline:hover { border-color: var(--lime); background: var(--lime-soft); box-shadow: none; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #FF7B93; box-shadow: 0 8px 28px rgba(255,92,122,0.35); }
    .btn-ghost { background: var(--surface-raised); color: var(--text-secondary); border: 1px solid var(--hairline); }
    .btn-ghost:hover { color: var(--text-primary); border-color: var(--hairline-bright); box-shadow: none; }
    .btn-sm { padding: 9px 16px; font-size: 13.5px; border-radius: 9px; }
    .btn-icon {
      width: 42px; height: 42px; border-radius: var(--radius-sm); background: var(--surface-raised);
      border: 1px solid var(--hairline); color: var(--text-secondary); display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: all 0.15s ease;
    }
    .btn-icon:hover { border-color: var(--lime); color: var(--lime); }

    /* ============ نماذج الإدخال ============ */
    label { display: block; margin: 18px 0 7px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 15px 16px; background: var(--bg-1); border: 1.5px solid var(--hairline);
      border-radius: var(--radius-sm); color: var(--text-primary); font-size: 16px; font-family: var(--font-body);
      transition: border 0.15s ease;
    }
    input:focus { outline: none; border-color: var(--lime); }

    /* ---- قائمة منسدلة مخصصة احترافية ---- */
    .select-field { position: relative; width: 100%; }
    .select-trigger {
      width: 100%; padding: 15px 16px; background: var(--bg-1); border: 1.5px solid var(--hairline);
      border-radius: var(--radius-sm); color: var(--text-primary); font-size: 15.5px; font-family: var(--font-body);
      cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border 0.15s ease;
      min-height: 54px;
    }
    .select-trigger:hover { border-color: var(--hairline-bright); }
    .select-trigger.open { border-color: var(--lime); }
    .select-trigger .value-wrap { display: flex; align-items: center; gap: 10px; }
    .select-trigger .value-icon { font-size: 18px; }
    .select-trigger .chev { color: var(--text-muted); font-size: 12px; transition: transform 0.2s ease; }
    .select-trigger.open .chev { transform: rotate(180deg); color: var(--lime); }
    .select-menu {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface-raised);
      border: 1px solid var(--hairline-bright); border-radius: var(--radius-md); box-shadow: var(--shadow-elev);
      z-index: 40; max-height: 320px; overflow-y: auto; padding: 6px;
      animation: menuIn 0.15s ease;
    }
    @keyframes menuIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .select-option {
      padding: 12px 14px; border-radius: 10px; cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; gap: 10px; transition: background 0.12s ease;
    }
    .select-option:hover { background: var(--bg-1); }
    .select-option.selected { background: var(--lime-soft); color: var(--lime); }
    .select-option .opt-main { display: flex; align-items: center; gap: 10px; }
    .select-option .opt-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .select-option.selected .opt-desc { color: var(--lime-dim); }
    .select-option .opt-check { font-size: 13px; color: var(--lime); opacity: 0; }
    .select-option.selected .opt-check { opacity: 1; }
    .select-option input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--lime); flex-shrink: 0; }

    fieldset { border: none; padding: 0; margin: 0; }

    /* ============ عناصر مركبة ============ */
    .row-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .stack { display: flex; flex-direction: column; gap: 12px; }

    .exercise-row {
      background: var(--surface-raised);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin: 8px 0;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .exercise-row.done { border-color: var(--success); background: var(--success-soft); }
    .exercise-row .num { font-family: var(--font-mono); color: var(--text-muted); font-size: 13px; margin-left: 8px; }

    .video-container {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      border-radius: var(--radius-sm); margin: 14px 0; background: #000;
      border: 1px solid var(--hairline);
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .video-fallback {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: var(--bg-1); padding: 20px; text-align: center;
    }
    .video-fallback .icon { font-size: 30px; }
    .video-fallback p { font-size: 13px; color: var(--text-muted); max-width: 260px; }

    .video-toggle-btn {
      background: var(--cobalt-soft); border: 1px solid rgba(91,140,255,0.35); color: var(--cobalt);
      width: 36px; height: 36px; border-radius: 10px; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s;
    }
    .video-toggle-btn:hover { background: rgba(91,140,255,0.25); }

    /* ============ حلقة الأداء (Signature element) ============ */
    .perf-ring-wrap { position: relative; width: 128px; height: 128px; flex-shrink: 0; }
    .perf-ring-wrap svg { transform: rotate(-90deg); }
    .perf-ring-track { fill: none; stroke: var(--hairline); stroke-width: 8; }
    .perf-ring-fill { fill: none; stroke: var(--lime); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(0.22,1,0.36,1); filter: drop-shadow(0 0 6px var(--lime-glow)); }
    .perf-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .perf-ring-center .big { font-family: var(--font-display); font-size: 30px; font-weight: 700; line-height: 1; }
    .perf-ring-center .small { font-size: 10.5px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.5px; margin-top: 3px; }

    /* ============ شبكة الإحصائيات ============ */
    .metric-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--hairline); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--hairline); }
    .metric-cell { background: var(--surface-raised); padding: 16px 10px; text-align: center; }
    .metric-cell .num { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--lime); }
    .metric-cell .lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 600; }

    /* ============ شارات ============ */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 100px; font-size: 11.5px; font-weight: 700; font-family: var(--font-mono); letter-spacing: 0.3px; }
    .badge-lime { background: var(--lime-soft); color: var(--lime); }
    .badge-cobalt { background: var(--cobalt-soft); color: var(--cobalt); }
    .badge-success { background: var(--success-soft); color: var(--success); }
    .badge-warning { background: var(--warning-soft); color: var(--warning); }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-muted { background: var(--hairline); color: var(--text-secondary); }

    /* ============ شرائط أيام الأسبوع ============ */
    .week-days-row { display: flex; gap: 7px; margin: 12px 0; flex-wrap: wrap; }
    .day-pill {
      width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; font-family: var(--font-mono); background: var(--bg-1); border: 1.5px solid var(--hairline);
      color: var(--text-muted); flex-shrink: 0; transition: all 0.25s ease;
    }
    .day-pill.done { background: var(--success); border-color: var(--success); color: #06251A; }
    .day-pill.today { border-color: var(--lime); color: var(--lime); box-shadow: 0 0 0 3px var(--lime-soft); }

    /* ============ رسم بياني بسيط ============ */
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
    .bar-label { width: 52px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; font-family: var(--font-mono); }
    .bar-track { flex: 1; height: 14px; background: var(--bg-1); border-radius: 8px; overflow: hidden; border: 1px solid var(--hairline); }
    .bar-fill { height: 100%; transition: width 0.6s ease; }
    .bar-fill.easy { background: var(--cobalt); }
    .bar-fill.just_right { background: var(--success); }
    .bar-fill.hard { background: var(--danger); }

    /* ============ بانر المدرب ============ */
    .coach-banner {
      display: flex; align-items: flex-start; gap: 12px;
      background: linear-gradient(120deg, var(--lime-soft), transparent);
      border: 1px solid rgba(201,255,61,0.25);
      border-radius: var(--radius-md);
      padding: 15px 16px; margin-bottom: 14px;
    }
    .coach-banner .icon { font-size: 24px; line-height: 1; flex-shrink: 0; }
    .coach-banner .text { font-size: 14px; line-height: 1.65; color: var(--text-primary); }
    .coach-banner .text strong { color: var(--lime); }

    .adapt-note {
      font-size: 12.5px; color: var(--text-secondary); background: var(--cobalt-soft);
      border: 1px solid rgba(91,140,255,0.2); border-radius: 12px; padding: 10px 12px; margin-top: 10px;
      display: flex; gap: 8px; align-items: flex-start;
    }

    /* ============ فلاتر شرائح ============ */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-chip {
      padding: 9px 16px; border-radius: 100px; font-size: 13px; cursor: pointer; font-weight: 600;
      background: var(--surface-raised); border: 1px solid var(--hairline); color: var(--text-secondary);
      transition: all 0.15s ease;
    }
    .filter-chip.active { background: var(--lime); border-color: var(--lime); color: #0A0C10; }

    .suggestion-chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 12px;
      background: var(--cobalt-soft); border: 1px solid rgba(91,140,255,0.3); color: var(--cobalt);
      font-size: 13px; cursor: pointer; margin: 4px 6px 4px 0; font-weight: 600; transition: background 0.15s;
    }
    .suggestion-chip:hover { background: rgba(91,140,255,0.24); }

    /* ============ تايمر الراحة ============ */
    .rest-timer { background: var(--bg-1); border: 1px solid var(--hairline); border-radius: var(--radius-lg); padding: 28px 20px; text-align: center; margin: 18px 0; }
    .timer-number { font-family: var(--font-display); font-size: 64px; font-weight: 700; color: var(--lime); font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 0 24px var(--lime-glow); }

    /* ============ التبويبات السفلية ============ */
    .tab-bar {
      position: sticky; bottom: 12px; display: flex; gap: 6px; background: var(--surface);
      border: 1px solid var(--hairline-bright); border-radius: 18px; padding: 6px; box-shadow: var(--shadow-elev);
      margin-top: 4px;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 6px;
      border-radius: 13px; cursor: pointer; color: var(--text-muted); font-size: 11px; font-weight: 700;
      transition: all 0.15s ease; background: transparent; border: none; font-family: var(--font-body);
    }
    .tab-btn .tab-icon { font-size: 19px; }
    .tab-btn.active { background: var(--lime-soft); color: var(--lime); }

    /* ============ رسوم متحركة ============ */
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { transform: scale(0.6); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes checkPulse { 0% { box-shadow: 0 0 0 0 rgba(53,224,161,0.5); } 70% { box-shadow: 0 0 0 12px rgba(53,224,161,0); } 100% { box-shadow: 0 0 0 0 rgba(53,224,161,0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .page-enter { animation: fadeSlideIn 0.35s cubic-bezier(0.22,1,0.36,1) forwards; }
    .pop-in { animation: popIn 0.4s ease forwards; }
    .pulse-once { animation: checkPulse 0.7s ease; }
    @media (prefers-reduced-motion: reduce) { .page-enter, .pop-in { animation: none; } }

    /* ============ نوافذ منبثقة ============ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(6,8,12,0.88); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 18px;
    }
    .modal-content {
      background: var(--surface); border: 1px solid var(--hairline-bright); border-radius: var(--radius-lg);
      padding: 22px; width: 100%; max-width: 760px; position: relative; animation: fadeSlideIn 0.25s ease;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 14px; left: 14px; background: var(--surface-raised); border: 1px solid var(--hairline);
      color: var(--text-primary); font-size: 18px; border-radius: 50%; width: 38px; height: 38px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }

    .error-message { background: var(--danger-soft); border: 1px solid var(--danger); color: #FF9FB2; padding: 11px 14px; border-radius: 11px; margin: 12px 0; font-size: 13.5px; }

    details summary { list-style: none; padding: 12px 15px; background: var(--surface-raised); border-radius: var(--radius-sm); border: 1px solid var(--hairline); cursor: pointer; user-select: none; }
    details summary::-webkit-details-marker { display: none; }
    details summary::after { content: '▾'; float: left; color: var(--text-muted); transition: transform 0.2s; }
    details[open] summary::after { transform: rotate(180deg); }
    details[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }

    /* شريط تقدم خطي */
    .linear-track { height: 6px; background: var(--bg-1); border-radius: 6px; overflow: hidden; border: 1px solid var(--hairline); }
    .linear-fill { height: 100%; background: var(--lime); transition: width 0.4s ease; }

    /* بطاقة اختيار كبيرة (لصفحة الإعداد) */
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .choice-card {
      background: var(--bg-1); border: 1.5px solid var(--hairline); border-radius: var(--radius-sm);
      padding: 16px 14px; cursor: pointer; transition: all 0.15s ease; text-align: center;
    }
    .choice-card:hover { border-color: var(--hairline-bright); }
    .choice-card.selected { border-color: var(--lime); background: var(--lime-soft); }
    .choice-card .ic { font-size: 24px; display: block; margin-bottom: 6px; }
    .choice-card .lbl { font-size: 13.5px; font-weight: 700; }
    .choice-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .choice-card.selected .sub { color: var(--lime-dim); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ======================== البيانات الثابتة ========================
    const exercises = [
      { id: 1, name: 'Squats', nameAr: 'القرفصاء', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/otzWCWpuW-A', demoStart: 20, calPerMin: 8 },
      { id: 2, name: 'Lunges', nameAr: 'الاندفاع', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/WzONHuAe6BY', demoStart: 15, calPerMin: 7 },
      { id: 3, name: 'Push-ups', nameAr: 'تمارين الضغط', muscleGroup: 'chest', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/IODxDxX7oi4', demoStart: 10, calPerMin: 7 },
      { id: 4, name: 'Knee Push-ups', nameAr: 'ضغط الركبة', muscleGroup: 'chest', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/IODxDxX7oi4', demoStart: 10, calPerMin: 5 },

    function computeLevel(age, goal) {
      if (age < 16) return 'beginner';

    function generatePlan(profile) {
      const { age, gender, goal, level, weeklyDays, sessionDuration, equipment } = profile;
      const suitableExercises = exercises.filter(ex => {
        if (ex.minAge && age < ex.minAge) return false;
        if (ex.maxAge && age > ex.maxAge) return false;
        if (ex.genderPreference !== 'all' && ex.genderPreference !== gender) return false;
        if (ex.equipment && ex.equipment.length > 0 && !ex.equipment.includes('none')) {
          return ex.equipment.every(eq => equipment.includes(eq));
        }
        return true;
      });

      let template = planTemplates.find(t => t.goal === goal && t.level === level) || planTemplates.find(t => t.goal === goal) || planTemplates[0];

      const weeksData = {};
      Object.keys(template.weeksData).slice(0, template.durationWeeks).forEach((weekKey, idx) => {
        const weekDays = [];
        const daysData = template.weeksData[weekKey];
        for (let i = 0; i < weeklyDays; i++) {
          const dayTemplate = daysData[i % daysData.length];
          const exercisesForDay = dayTemplate.exerciseIds.map(id => {
            let ex = suitableExercises.find(e => e.id === id);
            if (!ex) {
              const original = exercises.find(e => e.id === id);
              if (original) ex = suitableExercises.find(e => e.muscleGroup === original.muscleGroup && e.difficulty === original.difficulty);
            }
            return ex || suitableExercises[0];
          });
          weekDays.push({ exercises: exercisesForDay, reps: [...dayTemplate.reps], rest: dayTemplate.rest, duration: sessionDuration });
        }
        weeksData[`week${idx + 1}`] = weekDays;
      });

      return {
        startDate: new Date().toISOString().split('T')[0],
        endDate: new Date(Date.now() + template.durationWeeks*7*24*60*60*1000).toISOString().split('T')[0],
        weeksData, currentWeek: 1, currentDayIndex: 0,
        adaptationLog: [], templateId: template.id, difficultyMultiplier: 1
      };
    }

    function adaptPlan(plan, log) {
      const recent = log.slice(-2).map(l => l.feedback);
      if (recent.length < 2) return { plan, note: null };
      const bothHard = recent.every(f => f === 'hard');
      const bothEasy = recent.every(f => f === 'easy');
      if (!bothHard && !bothEasy) return { plan, note: null };

      const newPlan = JSON.parse(JSON.stringify(plan));
      const factor = bothHard ? 0.85 : 1.15;
      const weekKeys = Object.keys(newPlan.weeksData);

      weekKeys.forEach(wk => {
        const weekNum = parseInt(wk.replace('week', ''));
        if (weekNum < newPlan.currentWeek) return;
        newPlan.weeksData[wk].forEach(day => {
          day.reps = day.reps.map(r => Math.max(5, Math.round(r * factor)));
          if (bothHard) day.rest = Math.min(90, Math.round(day.rest * 1.15));
          if (bothEasy) day.rest = Math.max(20, Math.round(day.rest * 0.9));
        });
      });

      newPlan.difficultyMultiplier = (newPlan.difficultyMultiplier || 1) * factor;
      const note = bothHard
        ? '⬇️ لاحظت أن آخر جلستين كانتا صعبة، فقلّلت التكرارات وزدت وقت الراحة قليلاً حتى تناسبك أكثر.'
        : '⬆️ أداؤك ممتاز! آخر جلستين كانتا سهلة، فرفعت التكرارات قليلاً لتستمر في التقدم.';

      newPlan.adaptationLog = [...(newPlan.adaptationLog || []), { date: new Date().toISOString().split('T')[0], type: bothHard ? 'decrease' : 'increase', note }];
      return { plan: newPlan, note };
    }

    function maybeAdvanceWeek(plan, log) {
      const currentWeekKey = `week${plan.currentWeek}`;
      const daysInWeek = plan.weeksData[currentWeekKey]?.length || 0;
      const sessionsThisWeek = log.filter(l => l.week === plan.currentWeek).length;
      const totalWeeks = Object.keys(plan.weeksData).length;
      if (sessionsThisWeek >= daysInWeek && plan.currentWeek < totalWeeks) {
        return { ...plan, currentWeek: plan.currentWeek + 1, currentDayIndex: 0 };
      }
      return plan;
    }

    function estimateCalories(exerciseIds, repsArr) {
      // تقدير تقريبي: كل تمرين نفترض له مدة قصيرة بناء على نوع العدة/الزمن
      let total = 0;
      exerciseIds.forEach((id, idx) => {
        const ex = exercises.find(e => e.id === id);
        if (!ex) return;
        const reps = repsArr[idx] || 10;
        const estMinutes = reps > 25 ? reps / 30 : reps / 12; // تمارين زمنية vs عدّية تقريباً
        total += estMinutes * (ex.calPerMin || 5);
      });
      return Math.round(total);
    }

    function MultiSelectField({ value, options, onChange, placeholder }) {
      const [isOpen, setIsOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const onClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', onClickOutside);
        return () => document.removeEventListener('mousedown', onClickOutside);
      }, []);
      const toggle = (val) => {
        if (val === 'none') { onChange(['none']); setIsOpen(false); return; }
        let next;
        if (value.includes(val)) next = value.filter(v => v !== val);
        else next = [...value.filter(v => v !== 'none'), val];
        if (next.length === 0) next = ['none'];
        onChange(next);
      };
      const selectedLabels = options.filter(o => value.includes(o.value)).map(o => o.label);
      return (
        <div className="select-field" ref={ref}>
          <div className={`select-trigger ${isOpen ? 'open' : ''}`} onClick={() => setIsOpen(v => !v)} style={{minHeight:'54px', height:'auto'}}>
            <span className="value-wrap" style={{flexWrap:'wrap'}}>
              {selectedLabels.length === 0 ? <span style={{color:'var(--text-muted)'}}>{placeholder}</span> : selectedLabels.map(l => (

                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');

      const handleSubmit = (e) => {

        if (existingUser) {
          if (existingUser.password === password) { setCurrentSession(username); onLogin(username); }
          else setError('كلمة المرور غير صحيحة');
        } else {
          const newUser = { username, password, profile: null, plan: null, log: [] };
          saveUserData(username, newUser);
          setCurrentSession(username);
          onLogin(username);
        }
      };
      return (
        <div className="card page-enter">
          <div style={{textAlign:'center', marginBottom:'8px'}}>
            <span className="eyebrow">PERFORMANCE COACHING</span>
            <h1 style={{color:'var(--lime)', marginTop:'4px'}}>PEAK</h1>
            <p style={{color:'var(--text-secondary)', marginTop:'8px', fontSize:'14.5px'}}>سجّل الدخول أو أنشئ حساباً جديداً للبدء</p>
          </div>
          <form onSubmit={handleSubmit}>
            <label>اسم المستخدم</label>
            <input type="text" value={username} onChange={e => { setUsername(e.target.value); setError(''); }} required />
            <label>كلمة المرور</label>
            <input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(''); }} required />
            {error && <div className="error-message">{error}</div>}
            <button type="submit" className="btn" style={{width:'100%', marginTop:'22px'}}>دخول / إنشاء حساب</button>
          </form>
        </div>
      );
    }

    // ======================== الإعداد الأولي ========================
    function Onboarding({ onComplete }) {
      const [step, setStep] = useState(1);
      const [name, setName] = useState('');
      const [gender, setGender] = useState('male');
      const [age, setAge] = useState(25);
      const [goal, setGoal] = useState('general_fitness');
      const [weeklyDays, setWeeklyDays] = useState(3);
      const [equipment, setEquipment] = useState(['none']);
      const ageOptions = Array.from({ length: 88 }, (_, i) => ({ value: i + 13, label: `${i + 13} سنة` }));

      const previewLevel = computeLevel(Number(age), goal);
      const totalSteps = 3;

      const handleSubmit = () => {
        const equipmentLabels = equipmentOptions.filter(o => equipment.includes(o.value)).map(o => o.label);
        onComplete({
          name: name || 'بطل', gender, age: Number(age), goal,
          level: computeLevel(Number(age), goal),
          weeklyDays: Number(weeklyDays),
          sessionDuration: 30,
          equipment, equipmentLabels
        });
      };

      return (
        <div className="card page-enter">
          <div className="row-between" style={{marginBottom:'6px'}}>
            <span className="eyebrow">STEP {step} / {totalSteps}</span>
            <span className="eyebrow" style={{color:'var(--text-muted)'}}>{difficultyLabels[previewLevel]}</span>
          </div>
          <div className="linear-track" style={{marginBottom:'20px'}}>
            <div className="linear-fill" style={{width: `${(step/totalSteps)*100}%`}}></div>
          </div>

          {step === 1 && (
            <div>
              <h2 style={{marginBottom:'4px'}}>من أنت؟</h2>
              <p style={{color:'var(--text-secondary)', fontSize:'13.5px', marginBottom:'6px'}}>معلومات أساسية لبناء خطة تناسبك</p>
              <label>الاسم</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="اكتب اسمك" />
              <label>الجنس</label>
              <SelectField value={gender} options={genderOptions} onChange={setGender} />
              <label>العمر</label>
              <SelectField value={age} options={ageOptions} onChange={v => setAge(v)} />
              <button className="btn" style={{width:'100%', marginTop:'24px'}} onClick={() => setStep(2)} disabled={!name.trim()}>التالي</button>
            </div>
          )}

          {step === 2 && (
            <div>
              <h2 style={{marginBottom:'4px'}}>ما هو هدفك؟</h2>
              <p style={{color:'var(--text-secondary)', fontSize:'13.5px', marginBottom:'6px'}}>سيحدد هذا نوع خطتك التدريبية</p>
              <div className="choice-grid">
                {goalOptions.map(g => (
                  <div key={g.value} className={`choice-card ${goal === g.value ? 'selected' : ''}`} onClick={() => setGoal(g.value)}>
                    <span className="ic">{g.icon}</span>
                    <div className="lbl">{g.label}</div>
                    <div className="sub">{g.desc}</div>
                  </div>
                ))}
              </div>
              <label>أيام التمرين في الأسبوع</label>
              <SelectField
                value={weeklyDays}
                options={[2,3,4,5,6].map(d => ({ value: d, label: `${d} أيام في الأسبوع`, icon: '📅' }))}
                onChange={v => setWeeklyDays(v)}
              />
              <div style={{display:'flex', gap:'10px', marginTop:'24px'}}>
                <button className="btn-outline btn" style={{flex:1}} onClick={() => setStep(1)}>السابق</button>
                <button className="btn" style={{flex:2}} onClick={() => setStep(3)}>التالي</button>
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <h2 style={{marginBottom:'4px'}}>ما المعدات المتوفرة لديك؟</h2>
              <p style={{color:'var(--text-secondary)', fontSize:'13.5px', marginBottom:'6px'}}>يمكنك اختيار أكثر من خيار</p>
              <MultiSelectField value={equipment} options={equipmentOptions} onChange={setEquipment} placeholder="اختر المعدات..." />

              <div className="adapt-note" style={{marginTop:'18px'}}>
                <span>📊</span>
                <span>المستوى المقترح بناءً على بياناتك: <strong style={{color:'var(--lime)'}}>{difficultyLabels[previewLevel]}</strong> — سيتغيّر تلقائياً حسب أدائك.</span>
              </div>

              <div style={{display:'flex', gap:'10px', marginTop:'24px'}}>
                <button className="btn-outline btn" style={{flex:1}} onClick={() => setStep(2)}>السابق</button>
                <button className="btn" style={{flex:2}} onClick={handleSubmit}>🚀 ابدأ رحلتك</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ======================== مساعدات لوحة التحكم ========================
    function coachMessage(profile, plan, log) {
      if (log.length === 0) return { icon: '👋', text: `أهلاً ${profile.name}! هذه أول جلسة لك — ابدأ بخطوات بسيطة وسأتابع أداءك لأبني لك خطة تتكيّف معك.` };
      const last3 = log.slice(-3);
      const hardCount = last3.filter(l => l.feedback === 'hard').length;
      const easyCount = last3.filter(l => l.feedback === 'easy').length;
      if (hardCount >= 2) return { icon: '💪', text: 'لاحظت أن التمارين الأخيرة كانت صعبة عليك. لا بأس، الخطة القادمة أخف قليلاً — الاستمرارية أهم من الشدة.' };
      if (easyCount >= 2) return { icon: '🔥', text: 'أداء رائع ومستمر! رفعت مستوى الخطة القادمة قليلاً لتستمر بالتحدي والتقدم.' };
      const daysSinceLast = Math.floor((Date.now() - new Date(log[log.length-1].date).getTime()) / 86400000);
      if (daysSinceLast >= 4) return { icon: '⏰', text: `مر ${daysSinceLast} أيام منذ آخر جلسة. عودة بسيطة اليوم أفضل من الانتظار لعودة "مثالية".` };
      return { icon: '✅', text: `استمرار ممتاز يا ${profile.name}! أكملت ${log.length} جلسة حتى الآن. واصل بنفس الوتيرة.` };
    }

    function WeekDaysRow({ plan, log }) {
      const currentWeekKey = `week${plan.currentWeek}`;
      const daysInWeek = plan.weeksData[currentWeekKey]?.length || 0;
      const sessionsThisWeek = log.filter(l => l.week === plan.currentWeek).length;
      return (
        <div className="week-days-row">
          {Array.from({ length: daysInWeek }, (_, i) => {
            const isDone = i < sessionsThisWeek;
            const isToday = i === sessionsThisWeek;
            return <div key={i} className={`day-pill ${isDone ? 'done' : ''} ${isToday && !isDone ? 'today' : ''}`}>{isDone ? '✓' : i + 1}</div>;
          })}
        </div>
      );
    }

    function ProgressChart({ log }) {
      if (log.length === 0) return null;
      const recent = log.slice(-8);
      const feedbackVal = { easy: 33, just_right: 66, hard: 100 };
      const feedbackLabelShort = { easy: 'سهل', just_right: 'مناسب', hard: 'صعب' };
      return (
        <div>
          <label style={{marginTop:0}}>📈 مستوى الشدة في آخر الجلسات</label>
          {recent.map((l, idx) => (
            <div className="bar-row" key={idx}>
              <span className="bar-label">{new Date(l.date).toLocaleDateString('ar-OM', { day:'numeric', month:'short' })}</span>
              <div className="bar-track"><div className={`bar-fill ${l.feedback}`} style={{ width: `${feedbackVal[l.feedback] || 50}%` }}></div></div>
              <span style={{fontSize:'11px', color:'var(--text-muted)', width:'42px', fontFamily:'var(--font-mono)'}}>{feedbackLabelShort[l.feedback] || '-'}</span>
            </div>
          ))}
        </div>
      );
    }

    // ======================== لوحة التحكم ========================
    function Dashboard({ profile, plan, log, onStartSession, onLibrary, onProgress, onReset, onLogout }) {
      if (!plan) return <div className="card">تحضير الخطة...</div>;
      const totalWeeks = Object.keys(plan.weeksData).length;
      const currentWeekKey = `week${plan.currentWeek}`;
      const sessionsThisWeek = log.filter(l => l.week === plan.currentWeek).length;
      const todayWorkout = plan.weeksData[currentWeekKey]?.[sessionsThisWeek] || null;
      const equipmentLabels = profile.equipmentLabels || [];
      const msg = coachMessage(profile, plan, log);

      const totalMinutes = log.length * (profile.sessionDuration || 30);
      const streak = (() => {
        let s = 0;
        const sorted = [...log].sort((a,b) => new Date(b.date) - new Date(a.date));
        let lastDate = null;
        for (const l of sorted) {
          const d = new Date(l.date);
          if (lastDate === null) { s = 1; lastDate = d; continue; }
          const diffDays = Math.round((lastDate - d) / 86400000);
          if (diffDays <= 3) { s++; lastDate = d; } else break;
        }
        return s;
      })();

      const daysInWeek = plan.weeksData[currentWeekKey]?.length || 1;
      const weekProgress = Math.min(sessionsThisWeek / daysInWeek, 1);
      const ringRadius = 52;
      const ringCirc = 2 * Math.PI * ringRadius;
      const ringOffset = ringCirc * (1 - weekProgress);

      const estCal = todayWorkout ? estimateCalories(todayWorkout.exercises.map(e => e.id), todayWorkout.reps) : 0;

      return (
        <div className="stack">
          {/* ---- هيدر مع حلقة الأداء ---- */}
          <div className="card page-enter">
            <div className="row-between">
              <div>
                <span className="eyebrow">WEEK {plan.currentWeek} / {totalWeeks}</span>
                <h1 style={{marginTop:'2px'}}>مرحباً {profile.name}</h1>
              </div>
              <div className="perf-ring-wrap">
                <svg width="128" height="128" viewBox="0 0 128 128">
                  <circle className="perf-ring-track" cx="64" cy="64" r={ringRadius}></circle>
                  <circle className="perf-ring-fill" cx="64" cy="64" r={ringRadius}
                    strokeDasharray={ringCirc} strokeDashoffset={ringOffset}></circle>
                </svg>
                <div className="perf-ring-center">
                  <span className="big">{sessionsThisWeek}/{daysInWeek}</span>
                  <span className="small">هذا الأسبوع</span>
                </div>
              </div>
            </div>

            <div className="coach-banner">
              <span className="icon">{msg.icon}</span>
              <span className="text">{msg.text}</span>
            </div>

            <div className="metric-strip">
              <div className="metric-cell"><div className="num">{log.length}</div><div className="lbl">جلسات</div></div>
              <div className="metric-cell"><div className="num">{streak}</div><div className="lbl">سلسلة نشطة</div></div>
              <div className="metric-cell"><div className="num">{totalMinutes}</div><div className="lbl">دقيقة</div></div>
            </div>
          </div>

          {/* ---- تمرين اليوم ---- */}
          <div className="card page-enter">
            {todayWorkout ? (
              <div>
                <div className="row-between" style={{marginBottom:'12px'}}>
                  <h2>تمرين اليوم</h2>
                  {estCal > 0 && <span className="badge badge-cobalt">🔥 ~{estCal} سعرة</span>}
                </div>
                {todayWorkout.exercises.map((ex, idx) => (
                  <TodayExerciseRow key={ex.id} ex={ex} reps={todayWorkout.reps[idx]} idx={idx} isDone={false} />
                ))}
                <button className="btn" style={{width:'100%', marginTop:'16px'}} onClick={onStartSession}>▶️ ابدأ الجلسة</button>
              </div>
            ) : (
              <div style={{textAlign:'center', padding:'12px 0'}}>
                <p style={{fontSize:'36px'}}>🎉</p>
                <h3 style={{marginTop:'6px'}}>أكملت كل جلسات هذا الأسبوع</h3>
                <p style={{color:'var(--text-secondary)', fontSize:'13.5px', marginTop:'4px'}}>عد غداً لمتابعة الخطة والانتقال للأسبوع القادم.</p>
              </div>
            )}
          </div>

          {/* ---- تفاصيل إضافية ---- */}
          <details className="card card-flush" style={{padding:0}}>
            <summary style={{border:'none', borderRadius:'var(--radius-lg)'}}>📊 تفاصيل التقدم والإحصائيات</summary>
            <div style={{padding:'18px 22px'}}>
              <label style={{marginTop:0}}>أيام هذا الأسبوع</label>
              <WeekDaysRow plan={plan} log={log} />
              {equipmentLabels.length > 0 && (
                <div style={{marginTop:'10px'}}>
                  <label>معداتك</label>
                  <div style={{display:'flex', gap:'6px', flexWrap:'wrap'}}>
                    {equipmentLabels.map(l => <span key={l} className="badge badge-muted">{l}</span>)}
                  </div>
                </div>
              )}
              {plan.adaptationLog && plan.adaptationLog.length > 0 && (
                <div className="adapt-note">
                  <span>🧠</span>
                  <span>{plan.adaptationLog[plan.adaptationLog.length - 1].note}</span>
                </div>
              )}
              <div style={{marginTop:'14px'}}><ProgressChart log={log} /></div>
            </div>
          </details>

          <div style={{display:'flex', gap:'10px'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={onLibrary}>📚 المكتبة</button>
            <button className="btn btn-ghost" style={{flex:1}} onClick={onProgress}>📈 التقدم</button>
            <button className="btn btn-icon" onClick={onLogout} title="خروج">🚪</button>
          </div>
        </div>
      );
    }

    // ======================== جلسة التمرين ========================
    function WorkoutSession({ plan, log, onFinish, onBack }) {
      const currentWeekKey = `week${plan.currentWeek}`;
      const days = plan.weeksData[currentWeekKey] || [];
      const sessionsThisWeek = log.filter(l => l.week === plan.currentWeek).length;
      const today = days[sessionsThisWeek] || days[0] || { exercises: [], reps: [], rest: 60 };

      const [step, setStep] = useState(0);
      const [phase, setPhase] = useState('exercise');
      const [restSeconds, setRestSeconds] = useState(today.rest);
      const [feedback, setFeedback] = useState('');
      const [justCompleted, setJustCompleted] = useState(false);

      useEffect(() => {
        if (phase === 'rest' && restSeconds > 0) {
          const timer = setTimeout(() => setRestSeconds(s => s - 1), 1000);
          return () => clearTimeout(timer);
        } else if (phase === 'rest' && restSeconds === 0) {
          if (step + 1 < today.exercises.length) { setStep(s => s + 1); setPhase('exercise'); }
          else { setPhase('complete'); }
        }
      }, [phase, restSeconds, step, today.exercises.length]);

      const goToRest = () => {
        setJustCompleted(true);
        setTimeout(() => setJustCompleted(false), 700);
        setPhase('rest');
        setRestSeconds(today.rest);
      };

      const finishSession = () => {
        onFinish({ date: new Date().toISOString().split('T')[0], week: plan.currentWeek, exercises: today.exercises.map(ex => ex.id), feedback });
      };

      const totalSteps = today.exercises.length;
      const overallProgress = phase === 'complete' ? 100 : Math.round(((step + (phase === 'rest' ? 1 : 0)) / totalSteps) * 100);

      if (phase === 'complete') {
        return (
          <div className="card page-enter">
            <div style={{textAlign:'center'}}>
              <p style={{fontSize:'48px'}} className="pop-in">🎉</p>
              <h2 style={{marginTop:'8px'}}>أحسنت! الجلسة اكتملت</h2>
            </div>
            <label>كيف كانت الشدة؟</label>
            <div className="choice-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
              {[{v:'easy', l:'سهل', i:'😌'},{v:'just_right', l:'مناسب', i:'👍'},{v:'hard', l:'صعب', i:'🥵'}].map(f => (
                <div key={f.v} className={`choice-card ${feedback === f.v ? 'selected' : ''}`} onClick={() => setFeedback(f.v)}>
                  <span className="ic">{f.i}</span>
                  <div className="lbl">{f.l}</div>
                </div>
              ))}
            </div>
            <div className="adapt-note"><span>🧠</span><span>تقييمك يساعدني على تعديل التكرارات ووقت الراحة تلقائياً في الجلسات القادمة.</span></div>
            <button className="btn" style={{width:'100%', marginTop:'14px'}} disabled={!feedback} onClick={finishSession}>💾 حفظ وإنهاء</button>
            <button className="btn btn-outline" style={{width:'100%', marginTop:'10px'}} onClick={onBack}>رجوع دون حفظ</button>
          </div>
        );
      }

      const currentEx = today.exercises[step];

      return (
        <div className="card page-enter">
          <div className="row-between" style={{marginBottom:'10px'}}>
            <span className="badge badge-cobalt">تمرين {step + 1} / {totalSteps}</span>
            <div className="linear-track" style={{width:'50%'}}><div className="linear-fill" style={{width:`${overallProgress}%`}}></div></div>
          </div>
          {phase === 'exercise' && currentEx && (
            <>
              <h2>{currentEx.nameAr || currentEx.name}</h2>
              <SmartVideo videoUrl={currentEx.videoUrl} title={currentEx.nameAr || currentEx.name} startSeconds={currentEx.demoStart || 0} autoPlay={true} />
              <p style={{fontSize:'15px'}}>التكرارات: <strong className="mono" style={{color:'var(--lime)'}}>{today.reps[step] || 'حسب الإحساس'}</strong></p>
              <button className={`btn ${justCompleted ? 'pulse-once' : ''}`} style={{width:'100%', marginTop:'12px'}} onClick={goToRest}>✅ تم الإنتهاء، راحة</button>
            </>
          )}
          {phase === 'rest' && (
            <div className="rest-timer">
              <span className="eyebrow">راحة</span>
              <div className="timer-number">{restSeconds}</div>
              <p style={{color:'var(--text-muted)', fontSize:'13px', marginTop:'4px'}}>ثانية</p>
              {step + 1 < today.exercises.length && (
                <p style={{marginTop:'10px', fontSize:'13.5px', color:'var(--text-secondary)'}}>التالي: {today.exercises[step+1].nameAr || today.exercises[step+1].name}</p>
              )}
              <button className="btn btn-outline" style={{width:'100%', marginTop:'14px'}} onClick={() => setRestSeconds(0)}>⏩ تخطي الراحة</button>
            </div>
          )}
          <button className="btn btn-ghost" style={{width:'100%', marginTop:'12px'}} onClick={onBack}>إنهاء مبكراً</button>
        </div>
      );
    }

    // ======================== المكتبة ========================
    function Library({ onBack, profile }) {
      const [selectedVideo, setSelectedVideo] = useState(null);
      const [filterGroup, setFilterGroup] = useState('all');
      const [search, setSearch] = useState('');

      const openVideo = (ex) => setSelectedVideo(ex);
      const closeVideo = () => setSelectedVideo(null);

      const relevantExercises = useMemo(() => {
        return exercises.filter(ex => {
          if (profile) {
            if (ex.minAge && profile.age < ex.minAge) return false;
            if (ex.maxAge && profile.age > ex.maxAge) return false;
            if (ex.genderPreference !== 'all' && ex.genderPreference !== profile.gender) return false;
          }
          return true;
        });
      }, [profile]);

      const groups = useMemo(() => ['all', ...Array.from(new Set(relevantExercises.map(e => e.muscleGroup)))], [relevantExercises]);

      const filtered = relevantExercises.filter(e => {
        const matchesGroup = filterGroup === 'all' || e.muscleGroup === filterGroup;
        const matchesSearch = !search.trim() || (e.nameAr || e.name).includes(search.trim());
        return matchesGroup && matchesSearch;
      });

      const alternativesFor = (ex) => relevantExercises.filter(e => e.id !== ex.id && e.muscleGroup === ex.muscleGroup).slice(0, 2);

      return (
        <div className="card page-enter">
          <div className="row-between" style={{marginBottom:'14px'}}>
            <button className="btn-icon" onClick={onBack}>➡️</button>
            <span className="eyebrow">EXERCISE LIBRARY</span>
          </div>
          <h2 style={{marginBottom:'4px'}}>مكتبة التمارين</h2>
          <p style={{color:'var(--text-muted)', fontSize:'13px', marginBottom:'14px'}}>
            {profile ? 'مفلترة حسب عمرك وجنسك تلقائياً' : 'كل التمارين المتاحة'} · {filtered.length} تمرين
          </p>
          <input type="text" placeholder="🔍 ابحث عن تمرين..." value={search} onChange={e => setSearch(e.target.value)} style={{marginBottom:'14px'}} />
          <div className="filter-row">
            {groups.map(g => (
              <span key={g} className={`filter-chip ${filterGroup === g ? 'active' : ''}`} onClick={() => setFilterGroup(g)}>
                {g === 'all' ? 'الكل' : `${muscleGroupIcons[g] || ''} ${muscleGroupLabels[g] || g}`}
              </span>
            ))}
          </div>
          {filtered.length === 0 && (
            <p style={{textAlign:'center', color:'var(--text-muted)', padding:'20px 0'}}>لا توجد نتائج مطابقة</p>
          )}
          {filtered.map(ex => (
            <div key={ex.id} className="panel" style={{marginBottom:'10px'}}>
              <div className="row-between">
                <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                  <span style={{fontSize:'18px'}}>{muscleGroupIcons[ex.muscleGroup]}</span>
                  <div>
                    <strong>{ex.nameAr || ex.name}</strong>
                    <div style={{fontSize:'11.5px', color:'var(--text-muted)', marginTop:'2px'}}>
                      {muscleGroupLabels[ex.muscleGroup]} · {difficultyLabels[ex.difficulty]}
                    </div>
                  </div>
                </div>
                <button className="btn-icon" onClick={() => openVideo(ex)} title="شاهد الفيديو">🎥</button>
              </div>
              {alternativesFor(ex).length > 0 && (
                <div style={{marginTop:'10px'}}>
                  {alternativesFor(ex).map(alt => (
                    <span key={alt.id} className="suggestion-chip" onClick={() => openVideo(alt)}>🔄 {alt.nameAr || alt.name}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
          {selectedVideo && (
            <div className="modal-overlay" onClick={closeVideo}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={closeVideo}>✕</button>
                <h3 style={{marginBottom:'10px'}}>{selectedVideo.nameAr || selectedVideo.name}</h3>
                <SmartVideo videoUrl={selectedVideo.videoUrl} title={selectedVideo.nameAr || selectedVideo.name} startSeconds={selectedVideo.demoStart || 0} autoPlay={true} />
                <div style={{marginTop: '14px', textAlign: 'center'}}>
                  <button className="btn btn-outline" onClick={closeVideo}>إغلاق</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ======================== شاشة التقدم الموسعة ========================
    function ProgressScreen({ onBack, profile, plan, log }) {
      if (!plan) return null;
      const totalWeeks = Object.keys(plan.weeksData).length;
      const totalSessionsPlanned = Object.values(plan.weeksData).reduce((sum, w) => sum + w.length, 0);
      const completionPct = Math.round((log.length / totalSessionsPlanned) * 100);

      const feedbackCounts = { easy: 0, just_right: 0, hard: 0 };
      log.forEach(l => { if (feedbackCounts[l.feedback] !== undefined) feedbackCounts[l.feedback]++; });

      const muscleFocus = {};
      log.forEach(l => {
        l.exercises.forEach(id => {
          const ex = exercises.find(e => e.id === id);
          if (ex) muscleFocus[ex.muscleGroup] = (muscleFocus[ex.muscleGroup] || 0) + 1;
        });
      });
      const topMuscles = Object.entries(muscleFocus).sort((a,b) => b[1]-a[1]).slice(0,5);
      const maxMuscleCount = topMuscles.length > 0 ? topMuscles[0][1] : 1;

      return (
        <div className="card page-enter">
          <div className="row-between" style={{marginBottom:'14px'}}>
            <button className="btn-icon" onClick={onBack}>➡️</button>
            <span className="eyebrow">PROGRESS OVERVIEW</span>
          </div>
          <h2 style={{marginBottom:'16px'}}>تقدمك الكامل</h2>

          <div className="metric-strip" style={{marginBottom:'16px'}}>
            <div className="metric-cell"><div className="num">{completionPct}%</div><div className="lbl">إنجاز الخطة</div></div>
            <div className="metric-cell"><div className="num">{log.length}</div><div className="lbl">من {totalSessionsPlanned} جلسة</div></div>
            <div className="metric-cell"><div className="num">{plan.currentWeek}</div><div className="lbl">من {totalWeeks} أسابيع</div></div>
          </div>

          <label style={{marginTop:0}}>توزيع الشدة</label>
          <div style={{display:'flex', gap:'8px', marginBottom:'8px'}}>
            <div className="panel" style={{flex:1, textAlign:'center'}}>
              <div className="mono" style={{fontSize:'22px', color:'var(--cobalt)', fontWeight:700}}>{feedbackCounts.easy}</div>
              <div style={{fontSize:'11px', color:'var(--text-muted)'}}>سهل</div>
            </div>
            <div className="panel" style={{flex:1, textAlign:'center'}}>
              <div className="mono" style={{fontSize:'22px', color:'var(--success)', fontWeight:700}}>{feedbackCounts.just_right}</div>
              <div style={{fontSize:'11px', color:'var(--text-muted)'}}>مناسب</div>
            </div>
            <div className="panel" style={{flex:1, textAlign:'center'}}>
              <div className="mono" style={{fontSize:'22px', color:'var(--danger)', fontWeight:700}}>{feedbackCounts.hard}</div>
              <div style={{fontSize:'11px', color:'var(--text-muted)'}}>صعب</div>
            </div>
          </div>

          {topMuscles.length > 0 && (
            <div style={{marginTop:'16px'}}>
              <label style={{marginTop:0}}>أكثر المجموعات العضلية تدريباً</label>
              {topMuscles.map(([group, count]) => (
                <div className="bar-row" key={group}>
                  <span className="bar-label">{muscleGroupIcons[group]} {muscleGroupLabels[group] || group}</span>
                  <div className="bar-track"><div className="bar-fill just_right" style={{width: `${(count/maxMuscleCount)*100}%`}}></div></div>
                  <span style={{fontSize:'11px', color:'var(--text-muted)', width:'24px', fontFamily:'var(--font-mono)'}}>{count}</span>
                </div>
              ))}
            </div>
          )}

          <div style={{marginTop:'18px'}}><ProgressChart log={log} /></div>

          {plan.adaptationLog && plan.adaptationLog.length > 0 && (
            <div style={{marginTop:'16px'}}>
              <label style={{marginTop:0}}>سجل التكيّف</label>
              {plan.adaptationLog.slice().reverse().map((a, i) => (
                <div key={i} className="adapt-note" style={{marginTop: i === 0 ? 0 : '8px'}}>
                  <span>{a.type === 'increase' ? '⬆️' : '⬇️'}</span>
                  <span>{a.note} <span className="mono" style={{color:'var(--text-muted)', fontSize:'11px'}}>· {a.date}</span></span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [plan, setPlan] = useState(null);
      const [log, setLog] = useState([]);
      const [screen, setScreen] = useState('dashboard');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const sessionUser = getCurrentSession();
        if (sessionUser) {
          const userData = getUserData(sessionUser);
          if (userData) {
            setCurrentUser(sessionUser);
            setProfile(userData.profile || null);
            setPlan(userData.plan || null);
            setLog(userData.log || []);
          }
        }
        setLoading(false);
      }, []);

      useEffect(() => {
        if (currentUser && profile !== null) saveUserData(currentUser, { profile, plan, log });
      }, [profile, plan, log, currentUser]);

      const handleLogin = (username) => {
        const userData = getUserData(username);
        if (userData) {
          setCurrentUser(username);
          setProfile(userData.profile || null);
          setPlan(userData.plan || null);
          setLog(userData.log || []);
          setScreen('dashboard');
        }
      };

      const handleOnboardingComplete = (newProfile) => {
        const newPlan = generatePlan(newProfile);
        setProfile(newProfile);
        setPlan(newPlan);
        setLog([]);
        setScreen('dashboard');
      };

      const handleLogout = () => {
        clearCurrentSession();
        setCurrentUser(null); setProfile(null); setPlan(null); setLog([]); setScreen('dashboard');
      };

      const handleReset = () => {
        if (confirm('حذف كل البيانات؟')) { setProfile(null); setPlan(null); setLog([]); }
      };

      const handleSessionFinish = (sessionData) => {
        const newLog = [...log, sessionData];
        setLog(newLog);
        const { plan: adaptedPlan } = adaptPlan(plan, newLog);
        const advancedPlan = maybeAdvanceWeek(adaptedPlan, newLog);
        setPlan(advancedPlan);
        setScreen('dashboard');
      };

      if (loading) return <div style={{display:'flex', justifyContent:'center', alignItems:'center', height:'100%'}}><div className="card">جاري التحميل...</div></div>;
      if (!currentUser) return <div className="app"><LoginScreen onLogin={handleLogin} /></div>;
      if (!profile) return <div className="app"><Onboarding onComplete={handleOnboardingComplete} /></div>;

      return (
        <div className="app">
          {screen === 'dashboard' && (
            <Dashboard profile={profile} plan={plan} log={log}
              onStartSession={() => setScreen('session')}
              onLibrary={() => setScreen('library')}
              onProgress={() => setScreen('progress')}
              onReset={handleReset} onLogout={handleLogout} />
          )}
          {screen === 'session' && (
            <WorkoutSession plan={plan} log={log} onFinish={handleSessionFinish} onBack={() => setScreen('dashboard')} />
          )}
          {screen === 'library' && <Library onBack={() => setScreen('dashboard')} profile={profile} />}
          {screen === 'progress' && <ProgressScreen onBack={() => setScreen('dashboard')} profile={profile} plan={plan} log={log} />}

          {screen !== 'session' && (
            <div className="tab-bar">
              <button className={`tab-btn ${screen === 'dashboard' ? 'active' : ''}`} onClick={() => setScreen('dashboard')}>
                <span className="tab-icon">🏠</span>الرئيسية
              </button>
              <button className={`tab-btn ${screen === 'library' ? 'active' : ''}`} onClick={() => setScreen('library')}>
                <span className="tab-icon">📚</span>المكتبة
              </button>
              <button className={`tab-btn ${screen === 'progress' ? 'active' : ''}`} onClick={() => setScreen('progress')}>
                <span className="tab-icon">📈</span>التقدم
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
