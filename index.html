<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>مدرب اللياقة الذكي - Fullscreen</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.15);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --success: #22c55e;
      --danger: #ef4444;
      --button-bg: rgba(249,115,22,0.9);
      --button-hover: #fb923c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      direction: rtl;
    }
    #root {
      width: 100%;
      max-width: 100%;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      width: 100%;
    }
    .btn {
      background: var(--button-bg);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: 'Cairo', sans-serif;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(249,115,22,0.3);
    }
    .btn:hover { background: var(--button-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(249,115,22,0.5); }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); box-shadow: none; }
    .btn-outline:hover { background: rgba(249,115,22,0.15); }
    .btn-danger { background: var(--danger); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
    .btn-danger:hover { background: #f87171; }

    label { display: block; margin: 16px 0 6px; font-weight: 600; color: var(--text-secondary); }
    input, select {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: border 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    fieldset { border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 16px; margin: 16px 0; }
    legend { color: var(--text-secondary); font-weight: 600; }
    .checkbox-label { display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
    .checkbox-label input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }

    .exercise-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.06);
      padding: 12px 16px;
      border-radius: 14px;
      margin: 8px 0;
      border: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      margin: 16px 0;
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0; border-radius: 16px;
    }
    .rest-timer {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      margin: 20px 0;
    }
    .timer-number { font-size: 48px; font-weight: 700; color: var(--accent); }
    .progress-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, rgba(255,255,255,0.2) 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }
    .progress-inner {
      width: 64px; height: 64px;
      background: #1e293b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-enter { animation: fadeSlideIn 0.4s ease forwards; }
    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    .modal-content {
      background: #1e293b;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 800px;
      position: relative;
      animation: fadeSlideIn 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 24px;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .multi-select {
      position: relative;
      width: 100%;
    }
    .multi-select-box {
      padding: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 52px;
    }
    .multi-select-box:hover { border-color: var(--accent); }
    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .selected-tag {
      background: var(--accent);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .selected-tag button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      margin: 0;
    }
    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      margin-top: 8px;
      padding: 8px;
    }
    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.1); }
    .dropdown-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }

    .error-message {
      background: rgba(239,68,68,0.2);
      border: 1px solid var(--danger);
      color: #fca5a5;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 14px;
    }
    .video-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
    }
    .fullscreen-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ======================== البيانات الثابتة ========================
    const exercises = [
      { id: 1, name: 'Squats', nameAr: 'القرفصاء', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/aclHkVaku9U' },
      { id: 2, name: 'Lunges', nameAr: 'الاندفاع', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/QOVaHwm-Q6U' },
      { id: 3, name: 'Push-ups', nameAr: 'تمارين الضغط', muscleGroup: 'chest', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/IODxDxX7oi4' },
      { id: 4, name: 'Knee Push-ups', nameAr: 'ضغط الركبة', muscleGroup: 'chest', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/jWcDvq7rGM4' },
      { id: 5, name: 'Plank', nameAr: 'اللوح الخشبي', muscleGroup: 'core', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/pSHjTRCQxIw' },
      { id: 6, name: 'Glute Bridge', nameAr: 'جسر الألوية', muscleGroup: 'glutes', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/wPM8icPu6H8' },
      { id: 7, name: 'Standing Calf Raises', nameAr: 'رفع السمانة واقفاً', muscleGroup: 'calves', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/3UWi44yN-wM' },
      { id: 8, name: 'Jumping Jacks', nameAr: 'قفز الحبل', muscleGroup: 'cardio', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 60, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/c4DAnQ6DtF8' },
      { id: 9, name: 'High Knees', nameAr: 'الركب العالية', muscleGroup: 'cardio', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 60, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/8opcQdC-V-U' },
      { id: 10, name: 'Dumbbell Shoulder Press', nameAr: 'ضغط الكتف بالدمبل', muscleGroup: 'shoulders', difficulty: 'intermediate', equipment: ['dumbbell'], minAge: 16, maxAge: 80, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/qEwKCR5JCog' },
      { id: 11, name: 'Dumbbell Row', nameAr: 'سحب الدمبل', muscleGroup: 'back', difficulty: 'intermediate', equipment: ['dumbbell'], minAge: 16, maxAge: 80, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/roCP6wCXPqo' },
      { id: 12, name: 'Dumbbell Squat', nameAr: 'قرفصاء بالدمبل', muscleGroup: 'legs', difficulty: 'intermediate', equipment: ['dumbbell'], minAge: 16, maxAge: 80, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/1oed-UmAxFs' },
      { id: 13, name: 'Bicycle Crunches', nameAr: 'بطن الدراجة', muscleGroup: 'core', difficulty: 'intermediate', equipment: ['none'], minAge: 13, maxAge: 80, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/9FGilxCbdz8' },
      { id: 14, name: 'Wall Sit', nameAr: 'الجلوس على الحائط', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/y-wV4VenR3w' },
      { id: 15, name: 'Leg Raises', nameAr: 'رفع الساقين', muscleGroup: 'core', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/JB2oyawG9KI' },
      { id: 16, name: 'Chair Squats', nameAr: 'قرفصاء الكرسي', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 60, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/2_3kDk7z1UU' },
      { id: 17, name: 'Standing Side Leg Raise', nameAr: 'رفع الساق جانباً', muscleGroup: 'legs', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/dK_n5KZ6YJI' },
      { id: 18, name: 'Yoga Child’s Pose', nameAr: 'وضعية الطفل', muscleGroup: 'stretching', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/2MJGg-dUKh0' },
      { id: 19, name: 'Cat-Cow Stretch', nameAr: 'تمدد القطة والبقرة', muscleGroup: 'stretching', difficulty: 'beginner', equipment: ['none'], minAge: 13, maxAge: 100, genderPreference: 'all', videoUrl: 'https://www.youtube.com/embed/kqnua4rHVVA' },
      { id: 20, name: 'Kegel Exercises', nameAr: 'تمارين قاع الحوض', muscleGroup: 'pelvic', difficulty: 'beginner', equipment: ['none'], minAge: 18, maxAge: 100, genderPreference: 'female', videoUrl: 'https://www.youtube.com/embed/10GgQ5IfcMk' },
    ];

    const planTemplates = [
      {
        id: 1, name: 'Full Body Beginner', goal: 'general_fitness', level: 'beginner', durationWeeks: 4,
        weeksData: {
          week1: [ { exerciseIds: [1,4,5,8,18], reps: [10,8,30,30,30], rest: 60 }, { exerciseIds: [2,15,7,9,19], reps: [8,10,12,30,30], rest: 60 } ],
          week2: [ { exerciseIds: [1,3,5,8,18], reps: [12,8,35,35,30], rest: 55 }, { exerciseIds: [2,6,7,9,19], reps: [10,12,12,30,30], rest: 55 } ],
          week3: [ { exerciseIds: [1,4,5,14,8], reps: [12,10,40,30,40], rest: 50 }, { exerciseIds: [2,15,7,9,13], reps: [10,12,15,40,20], rest: 50 } ],
          week4: [ { exerciseIds: [1,3,5,14,9], reps: [15,10,45,35,45], rest: 45 }, { exerciseIds: [2,6,7,13,19], reps: [12,15,15,25,30], rest: 45 } ],
        }
      },
      {
        id: 2, name: 'Strength Intermediate', goal: 'muscle_build', level: 'intermediate', durationWeeks: 4,
        weeksData: {
          week1: [ { exerciseIds: [10,11,12,13], reps: [10,10,8,15], rest: 45 }, { exerciseIds: [10,11,6,13], reps: [10,10,12,15], rest: 45 } ],
          week2: [ { exerciseIds: [10,11,12,5], reps: [12,12,10,40], rest: 40 }, { exerciseIds: [10,11,3,13], reps: [12,12,10,20], rest: 40 } ],
          week3: [ { exerciseIds: [10,11,12,13], reps: [14,14,12,20], rest: 35 }, { exerciseIds: [10,11,6,5], reps: [14,14,15,45], rest: 35 } ],
          week4: [ { exerciseIds: [10,11,12,13], reps: [16,16,14,25], rest: 30 }, { exerciseIds: [10,11,3,5], reps: [16,16,12,50], rest: 30 } ],
        }
      }
    ];

    const allEquipmentOptions = [
      'بدون معدات', 'دمبل', 'بار', 'كيتل بيل', 'شريط مقاومة', 'سجادة',
      'دراجة هوائية', 'جهاز مشي', 'كرة سويسرية', 'مقعد', 'عقلة',
      'حبل قفز', 'ستيب', 'أوزان حرة', 'إليبتيكال', 'آلة تجديف'
    ];

    // ======================== دوال التخزين والحسابات ========================
    const STORAGE_KEYS = {
      users: 'fitness_users',
      currentSession: 'fitness_session'
    };

    const loadUsers = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.users)) || []; } catch { return []; }
    };
    const saveUsers = (users) => {
      localStorage.setItem(STORAGE_KEYS.users, JSON.stringify(users));
    };

    const getCurrentSession = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.currentSession)); } catch { return null; }
    };
    const setCurrentSession = (username) => {
      localStorage.setItem(STORAGE_KEYS.currentSession, JSON.stringify(username));
    };
    const clearCurrentSession = () => {
      localStorage.removeItem(STORAGE_KEYS.currentSession);
    };

    const saveUserData = (username, data) => {
      const users = loadUsers();
      const index = users.findIndex(u => u.username === username);
      if (index >= 0) {
        users[index] = { ...users[index], ...data };
      } else {
        users.push({ username, ...data });
      }
      saveUsers(users);
    };

    const getUserData = (username) => {
      const users = loadUsers();
      return users.find(u => u.username === username) || null;
    };

    function generatePlan(profile) {
      const { age, gender, goal, level, weeklyDays, sessionDuration, equipment } = profile;
      const suitableExercises = exercises.filter(ex => {
        if (ex.minAge && age < ex.minAge) return false;
        if (ex.maxAge && age > ex.maxAge) return false;
        if (ex.genderPreference !== 'all' && ex.genderPreference !== gender) return false;
        if (ex.equipment && ex.equipment.length > 0 && !ex.equipment.includes('none')) {
          return ex.equipment.every(eq => equipment.includes(eq));
        }
        return true;
      });
      let template = planTemplates.find(t => t.goal === goal && t.level === level) || planTemplates.find(t => t.goal === goal) || planTemplates[0];
      const weeksData = {};
      Object.keys(template.weeksData).slice(0, template.durationWeeks).forEach((weekKey, idx) => {
        const weekDays = [];
        const daysData = template.weeksData[weekKey];
        for (let i = 0; i < weeklyDays; i++) {
          const dayTemplate = daysData[i % daysData.length];
          const exercisesForDay = dayTemplate.exerciseIds.map(id => {
            let ex = suitableExercises.find(e => e.id === id);
            if (!ex) {
              const original = exercises.find(e => e.id === id);
              if (original) ex = suitableExercises.find(e => e.muscleGroup === original.muscleGroup && e.difficulty === original.difficulty);
            }
            return ex || suitableExercises[0];
          });
          weekDays.push({ exercises: exercisesForDay, reps: dayTemplate.reps, rest: dayTemplate.rest, duration: sessionDuration });
        }
        weeksData[`week${idx + 1}`] = weekDays;
      });
      return { startDate: new Date().toISOString().split('T')[0], endDate: new Date(Date.now() + template.durationWeeks*7*24*60*60*1000).toISOString().split('T')[0], weeksData, currentWeek: 1, adaptationLog: [], templateId: template.id };
    }

    function MultiSelect({ options, selected, onChange }) {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const toggleOption = (option) => {
        let newSelected;
        if (option === 'بدون معدات') {
          newSelected = ['بدون معدات'];
          setIsOpen(false);
          onChange(newSelected);
          return;
        }
        if (selected.includes(option)) {
          newSelected = selected.filter(s => s !== option);
        } else {
          newSelected = [...selected.filter(s => s !== 'بدون معدات'), option];
        }
        if (newSelected.length === 0) newSelected = ['بدون معدات'];
        onChange(newSelected);
      };

      return (
        <div className="multi-select" ref={containerRef}>
          <div className="multi-select-box" onClick={() => setIsOpen(!isOpen)}>
            {selected.length === 0 ? <span style={{color: 'gray'}}>اختر المعدات...</span> : (
              <div className="selected-tags">
                {selected.map(item => (
                  <span key={item} className="selected-tag">
                    {item}
                    <button type="button" onClick={(e) => { e.stopPropagation(); toggleOption(item); }}>×</button>
                  </span>
                ))}
              </div>
            )}
            <span>▼</span>
          </div>
          {isOpen && (
            <div className="dropdown-list">
              {options.map(option => (
                <label key={option} className="dropdown-item">
                  <input
                    type="checkbox"
                    checked={selected.includes(option)}
                    onChange={() => toggleOption(option)}
                  />
                  {option}
                </label>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ======================== شاشة تسجيل الدخول ========================
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!username.trim() || !password.trim()) {
          setError('الرجاء إدخال اسم المستخدم وكلمة المرور');
          return;
        }
        const existingUser = getUserData(username);
        if (existingUser) {
          if (existingUser.password === password) {
            setCurrentSession(username);
            onLogin(username);
          } else {
            setError('كلمة المرور غير صحيحة');
          }
        } else {
          const newUser = {
            username,
            password,
            profile: null,
            plan: null,
            log: []
          };
          saveUserData(username, newUser);
          setCurrentSession(username);
          onLogin(username);
        }
      };

      return (
        <div className="glass-card page-enter">
          <h1 style={{textAlign:'center', color: 'var(--accent)'}}>🏋️ مدربك الذكي</h1>
          <p style={{textAlign:'center', color: 'var(--text-secondary)', marginBottom: '20px'}}>أدخل اسم المستخدم وكلمة المرور للدخول أو لإنشاء حساب جديد</p>
          <form onSubmit={handleSubmit}>
            <label>اسم المستخدم</label>
            <input value={username} onChange={e => { setUsername(e.target.value); setError(''); }} required />
            <label>كلمة المرور</label>
            <input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(''); }} required />
            {error && <div className="error-message">{error}</div>}
            <button type="submit" className="btn" style={{width:'100%', marginTop:'20px'}}>🔐 دخول / إنشاء حساب</button>
          </form>
        </div>
      );
    }

    // ======================== باقي المكونات ========================
    function Onboarding({ onComplete }) {
      const [name, setName] = useState('');
      const [gender, setGender] = useState('male');
      const [age, setAge] = useState(25);
      const [goal, setGoal] = useState('general_fitness');
      const [weeklyDays, setWeeklyDays] = useState(3);
      const [equipment, setEquipment] = useState(['بدون معدات']);

      const ageOptions = Array.from({ length: 88 }, (_, i) => i + 13);

      const handleSubmit = (e) => {
        e.preventDefault();
        const equipmentMap = {
          'بدون معدات': 'none', 'دمبل': 'dumbbell', 'بار': 'barbell', 'كيتل بيل': 'kettlebell',
          'شريط مقاومة': 'resistance_band', 'سجادة': 'mat', 'دراجة هوائية': 'bike',
          'جهاز مشي': 'treadmill', 'كرة سويسرية': 'swiss_ball', 'مقعد': 'bench',
          'عقلة': 'pullup_bar', 'حبل قفز': 'jump_rope', 'ستيب': 'step',
          'أوزان حرة': 'free_weights', 'إليبتيكال': 'elliptical', 'آلة تجديف': 'rowing_machine'
        };
        const mappedEquipment = equipment.map(e => equipmentMap[e] || e);
        onComplete({
          name, gender, age: Number(age), goal,
          level: age > 55 || age < 18 ? 'beginner' : 'beginner',
          weeklyDays: Number(weeklyDays),
          sessionDuration: 30,
          equipment: mappedEquipment,
          equipmentLabels: equipment
        });
      };

      return (
        <div className="glass-card page-enter">
          <h1 style={{textAlign:'center', color: 'var(--accent)'}}>🏋️ مدربك الذكي</h1>
          <form onSubmit={handleSubmit}>
            <label>الاسم</label>
            <input value={name} onChange={e => setName(e.target.value)} required />
            <label>الجنس</label>
            <select value={gender} onChange={e => setGender(e.target.value)}>
              <option value="male">ذكر</option>
              <option value="female">أنثى</option>
              <option value="other">آخر</option>
            </select>
            <label>العمر</label>
            <select value={age} onChange={e => setAge(e.target.value)}>
              {ageOptions.map(a => <option key={a} value={a}>{a} سنة</option>)}
            </select>
            <label>الهدف</label>
            <select value={goal} onChange={e => setGoal(e.target.value)}>
              <option value="general_fitness">لياقة عامة</option>
              <option value="weight_loss">خسارة وزن</option>
              <option value="muscle_build">بناء عضلات</option>
            </select>
            <label>أيام التمرين في الأسبوع</label>
            <select value={weeklyDays} onChange={e => setWeeklyDays(e.target.value)}>
              {[2,3,4,5,6].map(d => <option key={d} value={d}>{d}</option>)}
            </select>
            <label>المعدات المتوفرة</label>
            <MultiSelect options={allEquipmentOptions} selected={equipment} onChange={setEquipment} />
            <button type="submit" className="btn" style={{width:'100%', marginTop:'20px'}}>🚀 ابدأ رحلتك</button>
          </form>
        </div>
      );
    }

    function Dashboard({ profile, plan, log, onStartSession, onLibrary, onReset, onLogout, onFullscreen, isFullscreen }) {
      if (!plan) return <div className="glass-card">تحضير الخطة...</div>;
      const totalWeeks = Object.keys(plan.weeksData).length;
      const progressDeg = Math.min((plan.currentWeek / totalWeeks) * 360, 360);
      const todayWorkout = plan.weeksData[`week${plan.currentWeek}`]?.[0] || null;
      const equipmentLabels = profile.equipmentLabels || [];

      return (
        <div className="glass-card page-enter">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'10px'}}>
            <h2 style={{color:'var(--accent)'}}>👋 مرحباً {profile.name}!</h2>
            <div style={{display:'flex', gap:'8px'}}>
              <button className="fullscreen-btn" onClick={onFullscreen} title={isFullscreen ? 'إنهاء ملء الشاشة' : 'ملء الشاشة'}>
                {isFullscreen ? '🗕' : '⛶'}
              </button>
              <button className="btn btn-outline" style={{padding:'8px 16px'}} onClick={onLogout}>🚪 خروج</button>
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:'20px', margin:'20px 0', flexWrap:'wrap'}}>
            <div className="progress-circle" style={{background: `conic-gradient(var(--accent) ${progressDeg}deg, rgba(255,255,255,0.2) 0deg)`}}>
              <div className="progress-inner">{plan.currentWeek}/{totalWeeks}</div>
            </div>
            <div>
              <p>📅 الأسبوع {plan.currentWeek} من {totalWeeks}</p>
              <p>✅ الجلسات المكتملة: {log.length}</p>
              {equipmentLabels.length > 0 && <p>🎒 المعدات: {equipmentLabels.join(', ')}</p>}
            </div>
          </div>
          {todayWorkout ? (
            <div>
              <h3>🔥 تمرين اليوم</h3>
              {todayWorkout.exercises.map((ex, idx) => (
                <div key={ex.id} className="exercise-item">
                  <span>{ex.nameAr || ex.name}</span>
                  <span>{todayWorkout.reps[idx] ? `${todayWorkout.reps[idx]} عدة` : 'حسب الزمن'}</span>
                </div>
              ))}
              <button className="btn" style={{width:'100%', marginTop:'16px'}} onClick={onStartSession}>▶️ ابدأ الجلسة</button>
            </div>
          ) : <p>لا يوجد تمرين اليوم</p>}
          <div style={{display:'flex', gap:'12px', marginTop:'20px', flexWrap:'wrap'}}>
            <button className="btn btn-outline" style={{flex:1, minWidth:'120px'}} onClick={onLibrary}>📚 المكتبة</button>
            <button className="btn btn-danger" style={{flex:1, minWidth:'120px'}} onClick={onReset}>🗑️ إعادة</button>
          </div>
        </div>
      );
    }

    function WorkoutSession({ plan, onFinish, onBack }) {
      const currentWeekKey = `week${plan.currentWeek}`;
      const days = plan.weeksData[currentWeekKey] || [];
      const today = days[0] || { exercises: [], reps: [], rest: 60 };
      const [step, setStep] = useState(0);
      const [phase, setPhase] = useState('exercise');
      const [restSeconds, setRestSeconds] = useState(today.rest);
      const [feedback, setFeedback] = useState('');

      useEffect(() => {
        if (phase === 'rest' && restSeconds > 0) {
          const timer = setTimeout(() => setRestSeconds(s => s - 1), 1000);
          return () => clearTimeout(timer);
        } else if (phase === 'rest' && restSeconds === 0) {
          if (step + 1 < today.exercises.length) { setStep(s => s + 1); setPhase('exercise'); }
          else { setPhase('complete'); }
        }
      }, [phase, restSeconds, step, today.exercises.length]);

      const goToRest = () => { setPhase('rest'); setRestSeconds(today.rest); };
      const finishSession = () => {
        onFinish({ date: new Date().toISOString().split('T')[0], exercises: today.exercises.map(ex => ex.id), feedback });
      };

      if (phase === 'complete') {
        return (
          <div className="glass-card page-enter">
            <h3>🎉 أحسنت! الجلسة اكتملت</h3>
            <label>كيف كانت الشدة؟</label>
            <select value={feedback} onChange={e => setFeedback(e.target.value)}>
              <option value="">اختر...</option> <option value="easy">سهل</option> <option value="just_right">مناسب</option> <option value="hard">صعب</option>
            </select>
            <button className="btn" style={{width:'100%'}} disabled={!feedback} onClick={finishSession}>💾 حفظ وإنهاء</button>
            <button className="btn btn-outline" style={{width:'100%', marginTop:'10px'}} onClick={onBack}>رجوع دون حفظ</button>
          </div>
        );
      }

      const currentEx = today.exercises[step];
      return (
        <div className="glass-card page-enter">
          {phase === 'exercise' && currentEx && (
            <>
              <h3>🏃 {currentEx.nameAr || currentEx.name}</h3>
              <div className="video-container">
                <iframe src={currentEx.videoUrl} title={currentEx.name} allowFullScreen></iframe>
              </div>
              <p>التكرارات: {today.reps[step] || 'حسب الإحساس'}</p>
              <button className="btn" style={{width:'100%'}} onClick={goToRest}>✅ تم الإنتهاء، راحة</button>
            </>
          )}
          {phase === 'rest' && (
            <div className="rest-timer">
              <h3>⏳ راحة</h3>
              <div className="timer-number">{restSeconds}</div>
              <p>ثانية</p>
              <button className="btn" style={{width:'100%'}} onClick={() => setRestSeconds(0)}>⏩ تخطي الراحة</button>
            </div>
          )}
          <button className="btn btn-outline" style={{width:'100%', marginTop:'12px'}} onClick={onBack}>🚪 إنهاء مبكراً</button>
        </div>
      );
    }

    // المكتبة مع فيديو منبثق في الأعلى
    function Library({ onBack }) {
      const [selectedVideo, setSelectedVideo] = useState(null);

      const openVideo = (url) => {
        setSelectedVideo(url);
      };

      const closeVideo = () => {
        setSelectedVideo(null);
      };

      return (
        <div className="glass-card page-enter">
          <button className="btn btn-outline" style={{marginBottom:'16px'}} onClick={onBack}>⬅️ رجوع</button>
          <h2>📚 مكتبة التمارين</h2>
          {exercises.map(ex => (
            <div key={ex.id} className="exercise-item" style={{flexDirection:'column', alignItems:'flex-start'}}>
              <strong>{ex.nameAr || ex.name}</strong>
              <small>العضلة: {ex.muscleGroup} | المستوى: {ex.difficulty}</small>
              <button className="btn" style={{marginTop:'8px', padding:'8px 16px'}} onClick={() => openVideo(ex.videoUrl)}>▶️ شاهد الفيديو</button>
            </div>
          ))}

          {selectedVideo && (
            <div className="modal-overlay" onClick={closeVideo}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={closeVideo}>✖️</button>
                <div className="video-container">
                  <iframe src={selectedVideo} title="تمرين" allowFullScreen></iframe>
                </div>
                <div style={{marginTop: '12px', textAlign: 'center'}}>
                  <button className="btn btn-outline" onClick={closeVideo}>إغلاق</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [plan, setPlan] = useState(null);
      const [log, setLog] = useState([]);
      const [screen, setScreen] = useState('dashboard');
      const [loading, setLoading] = useState(true);
      const [isFullscreen, setIsFullscreen] = useState(false);

      const toggleFullscreen = useCallback(() => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().then(() => setIsFullscreen(true)).catch(err => console.warn(err));
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen().then(() => setIsFullscreen(false));
          }
        }
      }, []);

      useEffect(() => {
        const handleFullscreenChange = () => {
          setIsFullscreen(!!document.fullscreenElement);
        };
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      useEffect(() => {
        const sessionUser = getCurrentSession();
        if (sessionUser) {
          const userData = getUserData(sessionUser);
          if (userData) {
            setCurrentUser(sessionUser);
            setProfile(userData.profile || null);
            setPlan(userData.plan || null);
            setLog(userData.log || []);
          }
        }
        setLoading(false);
      }, []);

      useEffect(() => {
        if (currentUser && profile !== null) {
          saveUserData(currentUser, { profile, plan, log });
        }
      }, [profile, plan, log, currentUser]);

      const handleLogin = (username) => {
        const userData = getUserData(username);
        if (userData) {
          setCurrentUser(username);
          setProfile(userData.profile || null);
          setPlan(userData.plan || null);
          setLog(userData.log || []);
          setScreen('dashboard');
        }
      };

      const handleOnboardingComplete = (newProfile) => {
        const newPlan = generatePlan(newProfile);
        setProfile(newProfile);
        setPlan(newPlan);
        setLog([]);
        setScreen('dashboard');
      };

      const handleLogout = () => {
        clearCurrentSession();
        setCurrentUser(null);
        setProfile(null);
        setPlan(null);
        setLog([]);
        setScreen('dashboard');
      };

      const handleReset = () => {
        if (confirm('حذف كل البيانات؟')) {
          setProfile(null);
          setPlan(null);
          setLog([]);
        }
      };

      if (loading) {
        return (
          <div style={{display:'flex', justifyContent:'center', alignItems:'center', height:'100%'}}>
            <div className="glass-card">جاري التحميل...</div>
          </div>
        );
      }

      if (!currentUser) {
        return (
          <div className="app">
            <LoginScreen onLogin={handleLogin} />
          </div>
        );
      }

      if (!profile) {
        return (
          <div className="app">
            <Onboarding onComplete={handleOnboardingComplete} />
          </div>
        );
      }

      return (
        <div className="app">
          {screen === 'dashboard' && (
            <Dashboard
              profile={profile}
              plan={plan}
              log={log}
              onStartSession={() => setScreen('session')}
              onLibrary={() => setScreen('library')}
              onReset={handleReset}
              onLogout={handleLogout}
              onFullscreen={toggleFullscreen}
              isFullscreen={isFullscreen}
            />
          )}
          {screen === 'session' && (
            <WorkoutSession
              plan={plan}
              onFinish={(sessionData) => {
                setLog(prev => [...prev, sessionData]);
                setScreen('dashboard');
              }}
              onBack={() => setScreen('dashboard')}
            />
          )}
          {screen === 'library' && (
            <Library onBack={() => setScreen('dashboard')} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
